name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x64
            archive: tar.gz
          - os: windows-latest
            name: win-x64
            archive: zip
          - os: macos-latest
            name: macos-arm64
            archive: tar.gz
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Prune dev dependencies
        run: npm prune --omit=dev

      - name: Stage release tree
        shell: bash
        run: |
          mkdir -p staging/frida-mcp
          cp -r dist node_modules package.json package-lock.json README.md staging/frida-mcp/

      - name: Pack (tar.gz)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          cd staging
          tar -czf "../frida-mcp-${GITHUB_REF_NAME}-${{ matrix.name }}.tar.gz" frida-mcp

      - name: Pack (zip)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          Compress-Archive -Path staging/frida-mcp -DestinationPath "frida-mcp-$env:GITHUB_REF_NAME-${{ matrix.name }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: frida-mcp-${{ matrix.name }}
          path: |
            frida-mcp-*.zip
            frida-mcp-*.tar.gz
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -R artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
